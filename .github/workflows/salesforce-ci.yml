name: Salesforce QA Automation Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *' # nightly regression

jobs:
  salesforce-tests:
    runs-on: ubuntu-latest
    env:
      SF_BASE_URL: ${{ secrets.SF_BASE_URL }}
      SF_USERNAME: ${{ secrets.SF_USERNAME }}
      SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
      SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
      SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
      SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
      SF_STD_USERNAME: ${{ secrets.SF_STD_USERNAME }}
      SF_STD_PASSWORD: ${{ secrets.SF_STD_PASSWORD }}
      SF_STD_TOKEN: ${{ secrets.SF_STD_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        if: github.event_name == 'pull_request' && env.SF_BASE_URL != '' && env.SF_USERNAME != '' && env.SF_PASSWORD != '' && env.SF_SECURITY_TOKEN != '' && env.SF_CLIENT_ID != '' && env.SF_CLIENT_SECRET != ''
        run: npm run test:smoke

      - name: Run API and E2E Regression Tests
        if: github.event_name != 'pull_request' && env.SF_BASE_URL != '' && env.SF_USERNAME != '' && env.SF_PASSWORD != '' && env.SF_SECURITY_TOKEN != '' && env.SF_CLIENT_ID != '' && env.SF_CLIENT_SECRET != ''
        run: npx playwright test tests/api tests/e2e

      - name: Run Security Regression Tests
        if: github.event_name != 'pull_request' && env.SF_BASE_URL != '' && env.SF_USERNAME != '' && env.SF_PASSWORD != '' && env.SF_SECURITY_TOKEN != '' && env.SF_CLIENT_ID != '' && env.SF_CLIENT_SECRET != '' && env.SF_STD_USERNAME != '' && env.SF_STD_PASSWORD != '' && env.SF_STD_TOKEN != ''
        run: npx playwright test tests/security

      - name: Skip Salesforce Tests (missing secrets)
        if: env.SF_BASE_URL == '' || env.SF_USERNAME == '' || env.SF_PASSWORD == '' || env.SF_SECURITY_TOKEN == '' || env.SF_CLIENT_ID == '' || env.SF_CLIENT_SECRET == ''
        run: echo "Skipping Salesforce tests because one or more required SF_* secrets are missing."

      - name: Skip Security Regression Tests (missing standard-user secrets)
        if: github.event_name != 'pull_request' && env.SF_BASE_URL != '' && env.SF_USERNAME != '' && env.SF_PASSWORD != '' && env.SF_SECURITY_TOKEN != '' && env.SF_CLIENT_ID != '' && env.SF_CLIENT_SECRET != '' && (env.SF_STD_USERNAME == '' || env.SF_STD_PASSWORD == '' || env.SF_STD_TOKEN == '')
        run: echo "Skipping Salesforce security tests because one or more SF_STD_* secrets are missing."

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
